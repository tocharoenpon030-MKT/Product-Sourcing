<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>แดชบอร์ด เทียบราคา-กำไร สินค้า</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #ffffff;
  --surface:   #f8f9fa;
  --surface2:  #f0f1f3;
  --border:    #e2e5e9;
  --accent:    #e07b1e;
  --accent2:   #2563eb;
  --green:     #16a34a;
  --red:       #dc2626;
  --yellow:    #d97706;
  --text:      #111827;
  --muted:     #6b7280;
  --font:      'Sarabun', sans-serif;
  --mono:      'IBM Plex Mono', monospace;
  --radius:    10px;
  --old:       #6366f1;
  --new:       #e07b1e;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 16px;
  min-height: 100vh;
  overflow-x: hidden;
}
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(12px);
  border-bottom: 2px solid var(--border);
  padding: 0 16px;
  display: flex; align-items: center; justify-content: space-between;
  height: 52px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.07);
  gap: 10px;
}
.brand { font-size: 16px; font-weight: 700; letter-spacing: .5px; color: var(--accent); white-space: nowrap; }
.brand span { color: var(--text); font-weight: 300; }
.nav-tabs { display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none; flex: 1; }
.nav-tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  white-space: nowrap; background: none; border: none;
  color: var(--muted); font-family: var(--font);
  font-size: 15px; font-weight: 600;
  padding: 6px 12px; border-radius: 20px;
  cursor: pointer; transition: all .2s;
}
.tab-btn.active, .tab-btn:hover { color: var(--text); background: var(--surface2); }
.tab-btn.active { color: var(--accent); }

main { padding: 16px; max-width: 980px; margin: 0 auto; }
.page { display: none; animation: fadeIn .25s ease; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px) } to { opacity:1; transform:translateY(0) } }

.section-title {
  font-size: 13px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--muted); margin: 22px 0 11px;
  display: flex; align-items: center; gap: 8px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.page-title { font-size: 22px; font-weight: 700; margin-bottom: 3px; color: var(--text); }
.page-sub   { font-size: 14px; color: var(--muted); margin-bottom: 18px; }

.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 8px; margin-bottom: 16px;
}
.stat-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 11px;
}
.stat-card .label { font-size: 13px; color: var(--muted); font-weight: 600; margin-bottom: 5px; }
.stat-card .value { font-family: var(--mono); font-size: 17px; font-weight: 600; color: var(--text); line-height: 1.2; }
.stat-card .sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
.stat-card.hl .value { color: var(--accent); }

.group-block {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 18px;
}
.group-head {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 12px; flex-wrap: wrap; gap: 6px;
}
.group-name { font-size: 17px; font-weight: 700; color: var(--text); }
.group-total { font-family: var(--mono); font-size: 14px; color: var(--accent); font-weight: 700; }

.pie-row { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; }
.pie-svg-wrap { flex-shrink: 0; }
.pie-legend { flex: 1; min-width: 180px; display: flex; flex-direction: column; gap: 6px; }
.pie-leg-item { display: flex; align-items: center; gap: 7px; font-size: 13px; }
.pie-leg-dot { width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0; }
.pie-leg-name { flex: 1; color: var(--text); font-weight: 600; }
.pie-leg-val { font-family: var(--mono); font-size: 12px; color: var(--muted); white-space: nowrap; }
.pie-leg-pct { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--accent); white-space: nowrap; min-width: 46px; text-align: right; }

.note {
  background: rgba(217,119,6,.07); border: 1px solid rgba(217,119,6,.3);
  border-radius: var(--radius); padding: 10px 14px;
  font-size: 13px; color: var(--yellow); margin-bottom: 14px;
  display: flex; align-items: flex-start; gap: 8px;
}
.note::before { content: '⚠'; flex-shrink: 0; margin-top: 1px; }

/* ── compare cards (old vs new) ── */
.compare-wrap { display: flex; flex-direction: column; gap: 14px; }
.compare-card {
  border: 1.5px solid var(--border); border-radius: var(--radius);
  overflow: hidden; background: var(--surface);
}
.compare-card-head {
  padding: 10px 14px; background: var(--surface2);
  font-size: 14px; font-weight: 700; color: var(--text);
  border-bottom: 1.5px solid var(--border);
}
.compare-row { display: grid; grid-template-columns: 1fr 1fr; }
.compare-col { padding: 12px 14px; }
.compare-col.old { border-right: 1.5px solid var(--border); }
.compare-tag {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 700; letter-spacing: .5px;
  padding: 2px 9px; border-radius: 20px; margin-bottom: 8px;
}
.compare-tag.old { background: rgba(99,102,241,.12); color: var(--old); }
.compare-tag.new { background: rgba(224,123,30,.12); color: var(--new); }
.compare-brand { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.compare-desc { font-size: 12px; color: var(--muted); margin-bottom: 10px; line-height: 1.4; }
.kv-line { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; border-bottom: 1px dashed var(--border); }
.kv-line:last-child { border-bottom: none; }
.kv-label { color: var(--muted); }
.kv-val { font-family: var(--mono); font-weight: 600; }

/* ── tbl ── */
.tbl-wrap {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  overflow: auto; margin-bottom: 16px;
}
table { width: 100%; border-collapse: collapse; min-width: 340px; }
thead th {
  background: var(--surface2);
  color: var(--muted); font-size: 12px; font-weight: 700;
  letter-spacing: .5px;
  padding: 8px 9px; text-align: right; white-space: nowrap;
  border-bottom: 1.5px solid var(--border);
}
thead th:first-child, thead th:nth-child(2), thead th:nth-child(3) { text-align: left; }
thead th.sticky-col { position: sticky; left: 0; background: var(--surface2); z-index: 2; }
tbody td {
  padding: 7px 9px; border-bottom: 1px solid var(--border);
  font-family: var(--mono); font-size: 13px; text-align: right; white-space: nowrap;
}
tbody td.txt { text-align: left; font-family: var(--font); font-size: 13px; white-space: normal; }
tbody td.sticky-col {
  position: sticky; left: 0; background: var(--surface);
  border-right: 1px solid var(--border); z-index: 1;
}
tbody tr:last-child td { border-bottom: none; }
tbody tr:nth-child(even) td { background: rgba(0,0,0,.02); }
tbody tr.row-old td { background: rgba(99,102,241,.05); }
tbody tr.row-new td { background: rgba(224,123,30,.05); }
.tag-pill { font-size: 11px; font-weight: 700; padding: 1px 7px; border-radius: 20px; display: inline-block; }
.tag-pill.old { background: rgba(99,102,241,.12); color: var(--old); }
.tag-pill.new { background: rgba(224,123,30,.12); color: var(--new); }
.cmp-cheap { color: var(--green); font-weight: 700; }
.cmp-exp   { color: var(--red); font-weight: 700; }
.cmp-eq    { color: var(--muted); }

.verdict-bar {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  padding: 10px 14px; border-top: 1.5px solid var(--border);
  background: var(--surface2);
}
.verdict-badge {
  font-size: 12px; font-weight: 700; padding: 4px 11px; border-radius: 20px;
  display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
}
.verdict-badge.good { background: rgba(22,163,74,.12); color: var(--green); }
.verdict-badge.warn { background: rgba(217,119,6,.12); color: var(--yellow); }
.verdict-badge.bad  { background: rgba(220,38,38,.10); color: var(--red); }
.verdict-detail { font-size: 12px; color: var(--muted); display: flex; gap: 14px; flex-wrap: wrap; }
.verdict-detail b { color: var(--text); font-family: var(--mono); }

.data-banner {
  background:linear-gradient(90deg,#dcfce7,#bbf7d0); border-bottom:2px solid #86efac;
  padding:8px 16px; display:flex; align-items:center; justify-content:space-between; gap:10px;
}
.data-banner .lbl { font-size:12px; color:#15803d; font-weight:600; }
.data-banner a {
  background:#16a34a;color:#fff;font-family:'Sarabun',sans-serif;font-size:12px;font-weight:700;
  padding:6px 14px;border-radius:20px;text-decoration:none;display:inline-flex;align-items:center;gap:5px;
  white-space:nowrap;box-shadow:0 1px 4px rgba(22,163,74,.4);
}

footer {
  text-align: center; padding: 20px 16px;
  font-size: 13px; color: var(--muted);
  border-top: 1px solid var(--border); margin-top: 28px;
}

select.filter-select {
  font-family: var(--font); font-size: 13px; font-weight: 600;
  border: 1.5px solid var(--border); border-radius: 20px;
  padding: 5px 10px; color: var(--text); background: var(--surface);
  cursor: pointer;
}

@media (max-width: 480px) {
  .topbar { height: 48px; }
  .brand { font-size: 14px; }
  .tab-btn { font-size: 13px; padding: 5px 9px; }
  main { padding: 10px; }
  .page-title { font-size: 19px; }
  .compare-row { grid-template-columns: 1fr; }
  .compare-col.old { border-right: none; border-bottom: 1.5px solid var(--border); }
  .pie-row { flex-direction: column; align-items: stretch; }
}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">เทียบราคา<span>-กำไร</span></div>
  <nav class="nav-tabs" id="navTabs"></nav>
</div>
<div class="data-banner">
  <span class="lbl">📊 ดูข้อมูลดิบ ใน Google Sheets</span>
  <a href="https://docs.google.com/spreadsheets/d/1tBrWrp4Hz8GOUQzq4UZ-NXFPscajlsahs2fTi1CPa6o/edit?gid=1525790701#gid=1525790701" target="_blank" rel="noopener">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    เปิด Google Sheet
  </a>
</div>
<main id="mainContent"></main>
<footer id="footerEl">กำลังโหลดข้อมูล…</footer>

<script>
const SHEET_ID = '1tBrWrp4Hz8GOUQzq4UZ-NXFPscajlsahs2fTi1CPa6o';
const GID = '1525790701';
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

const fmt = (n, dec=0) => (n===null||n===undefined||isNaN(n)) ? '–' : Number(n).toLocaleString('th-TH',{maximumFractionDigits:dec, minimumFractionDigits:dec});
const fmtPct = (n) => (n===null||n===undefined||isNaN(n)) ? '–' : (n*100>=0?'+':'') + (n*100).toFixed(1) + '%';
const fmtMoney = (n,dec=2) => (n===null||n===undefined||isNaN(n)) ? '–' : Number(n).toLocaleString('th-TH',{maximumFractionDigits:dec, minimumFractionDigits:dec});

function parseCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
    else cur += c;
  }
  result.push(cur.trim());
  return result;
}

function numClean(v) {
  if (v === undefined || v === null) return null;
  let s = String(v).trim();
  if (s === '' || s === '-' || s === '–') return null;
  const isPct = s.includes('%');
  s = s.replace(/,/g,'').replace(/%/g,'').trim();
  let n = parseFloat(s);
  if (isNaN(n)) return null;
  if (isPct) n = n/100;
  return n;
}

function parseSheet(csvText) {
  const lines = csvText.replace(/\r/g,'').split('\n').filter(l => l.trim().length>0);
  const rows = lines.map(parseCSVLine);
  // data starts row index 2 (0-indexed) -> excel row 3
  const items = [];
  for (let i = 2; i < rows.length; i++) {
    const r = rows[i];
    const type1 = (r[0]||'').trim();
    if (!type1) continue;
    const item = {
      type1,
      type2: (r[1]||'').trim(),
      brand: (r[2]||'').trim(),
      code: (r[3]||'').trim(),
      desc: (r[4]||'').trim(),
      groupProfit: numClean(r[5]),
      itemProfit: numClean(r[6]),
      qty2568: numClean(r[7]),
      qty2569: numClean(r[8]),
      cost: numClean(r[9]),
      purchasePrice: numClean(r[10]),
      purchaseProfitPct: numClean(r[11]),
      purchaseProfitPerUnit: numClean(r[12]),
      purchaseCompetitorPrice: numClean(r[13]),
      purchaseDiff: numClean(r[14]),
      purchaseSummary: (r[15]||'').trim(),
      ivSellPrice: numClean(r[16]),
      ivProfitPct: numClean(r[17]),
      ivProfitPerUnit: numClean(r[18]),
      ivCompetitorPrice: numClean(r[19]),
      ivDiff: numClean(r[20]),
      ivSummary: (r[21]||'').trim(),
      ikSellPrice: numClean(r[22]),
      ikProfitPct: numClean(r[23]),
      ikProfitPerUnit: numClean(r[24]),
      ikCompetitorPrice: numClean(r[25]),
      ikDiff: numClean(r[26]),
      ikSummary: (r[27]||'').trim(),
      website: (r[28]||'').trim(),
    };
    items.push(item);
  }
  return items;
}

// ── group items into pairs (old "ขายอยู่" + new "ใหม่") under each ประเภท1 ──
function buildGroups(items) {
  const order = [];
  const map = {};
  items.forEach(it => {
    if (!map[it.type1]) { map[it.type1] = { name: it.type1, groupProfit: null, pairs: [] }; order.push(it.type1); }
    const g = map[it.type1];
    // groupProfit (col F) is only populated on the first row of each ประเภท1 block.
    // Only set it once, from the first row that actually carries a value — never let
    // a later blank/merged row overwrite it back to null.
    if (g.groupProfit === null && it.groupProfit !== null) g.groupProfit = it.groupProfit;
  });
  order.forEach(name => {
    const g = map[name];
    const groupItems = items.filter(it => it.type1 === name);
    let i = 0;
    while (i < groupItems.length) {
      const cur = groupItems[i];
      const next = groupItems[i+1];
      if (cur.type2 === 'ขายอยู่' && next && next.type2 === 'ใหม่') {
        g.pairs.push({ old: cur, new: next });
        i += 2;
      } else {
        g.pairs.push({ old: cur.type2==='ขายอยู่'?cur:null, new: cur.type2==='ใหม่'?cur:null });
        i += 1;
      }
    }
  });
  return order.map(name => map[name]);
}

let allItems = null;
let groups = null;

function load() {
  fetch(CSV_URL)
    .then(r => { if(!r.ok) throw new Error('HTTP '+r.status); return r.text(); })
    .then(csv => {
      try {
        allItems = parseSheet(csv);
        if (!allItems.length) throw new Error('อ่านข้อมูลไม่พบรายการสินค้า');
        groups = buildGroups(allItems);
        document.getElementById('footerEl').textContent = 'ข้อมูล ณ วันที่ 22 มิ.ย. 2569  |  หน่วย: บาท';
        renderAll();
      } catch(e) {
        showError('อ่านข้อมูลไม่สำเร็จ: ' + e.message);
      }
    })
    .catch(e => showError('เชื่อมต่อ Google Sheets ไม่ได้: ' + e.message));
}

function showError(msg) {
  document.getElementById('mainContent').innerHTML = `<div style="text-align:center;padding:60px 20px">
    <div style="font-size:32px;margin-bottom:12px">⚠️</div>
    <div style="font-size:15px;font-weight:700;color:#dc2626;margin-bottom:8px">โหลดข้อมูลไม่สำเร็จ</div>
    <div style="font-size:13px;color:#6b7280;margin-bottom:16px">${msg}</div>
    <button onclick="load()" style="background:#2563eb;color:#fff;border:none;border-radius:20px;padding:8px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Sarabun',sans-serif">ลองใหม่</button>
  </div>`;
}

// ── PIE CHART (pure SVG, no deps) ──
const PIE_COLORS = ['#e07b1e','#2563eb','#16a34a','#d97706','#6366f1','#dc2626','#0ea5e9','#9333ea','#059669','#ea580c'];
function buildPieSVG(slices, size=140) {
  const total = slices.reduce((s,x)=>s+x.value,0) || 1;
  const r = size/2 - 4, cx = size/2, cy = size/2;
  let angle = -90;
  let paths = '';
  slices.forEach((s,i) => {
    const frac = s.value/total;
    const sweep = frac*360;
    const x1 = cx + r*Math.cos(angle*Math.PI/180);
    const y1 = cy + r*Math.sin(angle*Math.PI/180);
    const endAngle = angle+sweep;
    const x2 = cx + r*Math.cos(endAngle*Math.PI/180);
    const y2 = cy + r*Math.sin(endAngle*Math.PI/180);
    const large = sweep > 180 ? 1 : 0;
    if (frac >= 0.999) {
      paths += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${s.color}"/>`;
    } else if (frac > 0.0001) {
      paths += `<path d="M${cx},${cy} L${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r} 0 ${large} 1 ${x2.toFixed(2)},${y2.toFixed(2)} Z" fill="${s.color}" stroke="#fff" stroke-width="1.5"/>`;
    }
    angle = endAngle;
  });
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${paths}<circle cx="${cx}" cy="${cy}" r="${r*0.55}" fill="#fff"/></svg>`;
}

function buildGroupPie(g) {
  // slices = each item's itemProfit (G), remainder = groupProfit(F) - sum(items)
  const itemsWithProfit = [];
  g.pairs.forEach(p => {
    if (p.old && p.old.itemProfit !== null && p.old.itemProfit !== undefined) {
      itemsWithProfit.push({ name: p.old.desc, value: p.old.itemProfit });
    }
  });
  const sumItems = itemsWithProfit.reduce((s,x)=>s+x.value,0);
  const total = (g.groupProfit !== null && g.groupProfit !== undefined) ? g.groupProfit : sumItems;
  const remainder = Math.max(0, total - sumItems);

  const slices = itemsWithProfit.map((it,i) => ({ ...it, color: PIE_COLORS[i % PIE_COLORS.length] }));
  if (remainder > 0.01) slices.push({ name: 'สินค้าอื่นๆ ในกลุ่ม', value: remainder, color: '#d1d5db' });

  if (!slices.length) {
    return `<div style="color:var(--muted);font-size:13px;padding:20px 0">ไม่มีข้อมูลกำไรสำหรับสร้างแผนภูมิ</div>`;
  }

  const svg = buildPieSVG(slices, 140);
  const legend = slices.map(s => {
    const pct = total ? (s.value/total*100) : 0;
    return `<div class="pie-leg-item">
      <div class="pie-leg-dot" style="background:${s.color}"></div>
      <div class="pie-leg-name">${s.name}</div>
      <div class="pie-leg-val">${fmtMoney(s.value,0)}</div>
      <div class="pie-leg-pct">${pct.toFixed(1)}%</div>
    </div>`;
  }).join('');

  return `<div class="pie-row">
    <div class="pie-svg-wrap">${svg}</div>
    <div class="pie-legend">${legend}</div>
  </div>`;
}

// ── PAGE 1: ภาพรวม ──
function buildPage1() {
  if (!groups) return '';
  const totalItems = allItems.length;
  const totalQty2568 = allItems.reduce((s,it)=>s+(it.qty2568||0),0);
  const totalQty2569 = allItems.reduce((s,it)=>s+(it.qty2569||0),0);

  const statCards = `
    <div class="stat-card"><div class="label">จำนวนกลุ่มสินค้า</div><div class="value">${groups.length}</div><div class="sub">กลุ่ม</div></div>
    <div class="stat-card"><div class="label">จำนวนรายการทั้งหมด</div><div class="value">${totalItems}</div><div class="sub">รายการ (ขายอยู่+ใหม่)</div></div>
    <div class="stat-card hl"><div class="label">จำนวนขาย 2568</div><div class="value">${fmt(totalQty2568,0)}</div><div class="sub">หน่วย (ม.ค.-ธ.ค.)</div></div>
    <div class="stat-card hl"><div class="label">จำนวนขาย 2569</div><div class="value">${fmt(totalQty2569,0)}</div><div class="sub">หน่วย (ม.ค.-พ.ค.)</div></div>
  `;

  const groupBlocks = groups.map(g => {
    const pairCount = g.pairs.length;
    return `<div class="group-block">
      <div class="group-head">
        <div class="group-name">${g.name}</div>
        <div class="group-total">กำไรกลุ่ม (ปี 2568): ${fmtMoney(g.groupProfit,0)} บาท</div>
      </div>
      <div class="note">สัดส่วนกำไรเฉพาะของแต่ละรายการ (ขายอยู่) เทียบกับกำไรรวมทั้งกลุ่ม — มี ${pairCount} คู่เปรียบเทียบ</div>
      ${buildGroupPie(g)}
    </div>`;
  }).join('');

  return `
  <div class="page-title">ภาพรวม เทียบราคา-กำไร</div>
  <div class="page-sub">สรุปกำไรและสัดส่วนรายการสินค้า แยกตามกลุ่ม</div>
  <div class="stat-grid">${statCards}</div>
  <div class="section-title">สัดส่วนกำไรแต่ละกลุ่ม</div>
  ${groupBlocks}
  `;
}

// ── PAGE 2: เทียบรายละเอียด (cards old vs new) ──
function summaryTag(summary) {
  if (summary === 'ถูก') return `<span class="cmp-cheap">ถูกกว่าคู่แข่ง</span>`;
  if (summary === 'แพง') return `<span class="cmp-exp">แพงกว่าคู่แข่ง</span>`;
  return `<span class="cmp-eq">${summary||'–'}</span>`;
}

// คุ้มไหม: เทียบกำไรต่อชิ้น (M) ใหม่ vs ขายอยู่ + เทียบจำนวนช่อง "ถูก" (P,V,AB) ใหม่ vs ขายอยู่
function buildVerdict(old, neu) {
  if (!old || !neu) return null;

  const profitOld = old.purchaseProfitPerUnit;
  const profitNew = neu.purchaseProfitPerUnit;
  const profitDelta = (profitOld !== null && profitNew !== null) ? (profitNew - profitOld) : null;
  const profitBetter = profitDelta !== null && profitDelta > 0;

  const countCheap = (it) => [it.purchaseSummary, it.ivSummary, it.ikSummary].filter(s => s === 'ถูก').length;
  const cheapOld = countCheap(old);
  const cheapNew = countCheap(neu);
  const priceBetter = cheapNew >= cheapOld;

  let cls, label;
  if (profitBetter && priceBetter) { cls = 'good'; label = '✅ คุ้มค่า ควรพิจารณานำเข้า'; }
  else if (profitBetter && !priceBetter) { cls = 'warn'; label = '⚠️ กำไรดีขึ้น แต่แพงกว่าราคาตลาดเดิม'; }
  else if (!profitBetter && priceBetter) { cls = 'warn'; label = '⚠️ ราคาสู้ตลาดได้ดีขึ้น แต่กำไรลดลง'; }
  else { cls = 'bad'; label = '❌ ไม่คุ้ม'; }

  const profitTxt = profitDelta === null ? 'ไม่มีข้อมูล' : `${profitDelta>0?'+':''}${fmtMoney(profitDelta,2)} บาท/ชิ้น`;

  return `<div class="verdict-bar">
    <span class="verdict-badge ${cls}">${label}</span>
    <div class="verdict-detail">
      <span>กำไร/ชิ้นเปลี่ยน: <b>${profitTxt}</b></span>
      <span>ถูกกว่าคู่แข่ง: ขายอยู่ <b>${cheapOld}/3</b> ช่อง · ใหม่ <b>${cheapNew}/3</b> ช่อง</span>
    </div>
  </div>`;
}

function buildCompareCard(pair, idx) {
  const old = pair.old, neu = pair.new;
  const title = (old && old.desc) || (neu && neu.desc) || `รายการที่ ${idx+1}`;

  function colHtml(it, tagClass, tagLabel) {
    if (!it) return `<div class="compare-col"><div class="compare-tag ${tagClass}">${tagLabel}</div><div style="color:var(--muted);font-size:13px">ไม่มีข้อมูล</div></div>`;
    const qtyLines = tagClass === 'old' ? `
      <div class="kv-line"><span class="kv-label">จำนวนขาย 2568</span><span class="kv-val">${fmt(it.qty2568,0)}</span></div>
      <div class="kv-line"><span class="kv-label">จำนวนขาย 2569</span><span class="kv-val">${fmt(it.qty2569,0)}</span></div>
    ` : '';
    return `<div class="compare-col ${tagClass==='old'?'old':''}">
      <div class="compare-tag ${tagClass}">${tagLabel}</div>
      <div class="compare-brand">${it.brand || '–'} ${it.code? '· '+it.code : ''}</div>
      <div class="compare-desc">${it.desc}</div>
      ${qtyLines}
      <div class="kv-line"><span class="kv-label">ราคาจัดซื้อ</span><span class="kv-val">${fmtMoney(it.purchasePrice)}</span></div>
      <div class="kv-line"><span class="kv-label">% กำไรจัดซื้อ</span><span class="kv-val">${fmtPct(it.purchaseProfitPct)}</span></div>
      <div class="kv-line"><span class="kv-label">กำไร/ชิ้น (จัดซื้อ)</span><span class="kv-val">${fmtMoney(it.purchaseProfitPerUnit)}</span></div>
      <div class="kv-line"><span class="kv-label">ราคาคู่แข่ง (จัดซื้อ)</span><span class="kv-val">${fmtMoney(it.purchaseCompetitorPrice)}</span></div>
      <div class="kv-line"><span class="kv-label">สรุปจัดซื้อ</span><span class="kv-val">${summaryTag(it.purchaseSummary)}</span></div>
      <div class="kv-line"><span class="kv-label">ขาย IV รับเอง</span><span class="kv-val">${fmtMoney(it.ivSellPrice)}</span></div>
      <div class="kv-line"><span class="kv-label">สรุป IV รับเอง</span><span class="kv-val">${summaryTag(it.ivSummary)}</span></div>
      <div class="kv-line"><span class="kv-label">ขาย IK-IV ส่งให้</span><span class="kv-val">${fmtMoney(it.ikSellPrice)}</span></div>
      <div class="kv-line"><span class="kv-label">สรุป IK-IV ส่งให้</span><span class="kv-val">${summaryTag(it.ikSummary)}</span></div>
      ${it.website ? `<div class="kv-line"><span class="kv-label">เว็บไซต์อ้างอิง</span><span class="kv-val" style="font-family:var(--font);font-weight:400">${it.website}</span></div>` : ''}
    </div>`;
  }

  const verdict = buildVerdict(old, neu);

  return `<div class="compare-card">
    <div class="compare-card-head">${title}</div>
    <div class="compare-row">
      ${colHtml(old,'old','ขายอยู่')}
      ${colHtml(neu,'new','สินค้าใหม่')}
    </div>
    ${verdict || ''}
  </div>`;
}

function buildPage2() {
  if (!groups) return '';
  const filterOptions = groups.map(g=>`<option value="${g.name}">${g.name}</option>`).join('');
  const sel = `<select class="filter-select" id="grpFilter" onchange="onFilterChange()">
    <option value="__all__">ทุกกลุ่ม</option>${filterOptions}
  </select>`;

  return `
  <div class="page-title">เทียบรายละเอียดสินค้า</div>
  <div class="page-sub">เปรียบเทียบ "ขายอยู่" กับ "สินค้าใหม่" ทีละคู่ — ราคา ต้นทุน กำไร และเทียบราคาคู่แข่ง</div>
  <div style="margin-bottom:14px">${sel}</div>
  <div class="compare-wrap" id="compareWrap"></div>
  `;
}

function renderComparePage() {
  const sel = document.getElementById('grpFilter');
  const val = sel ? sel.value : '__all__';
  const wrap = document.getElementById('compareWrap');
  if (!wrap) return;
  let html = '';
  groups.forEach(g => {
    if (val !== '__all__' && g.name !== val) return;
    html += `<div class="section-title">${g.name}</div>`;
    g.pairs.forEach((p,i) => { html += buildCompareCard(p,i); });
  });
  wrap.innerHTML = html;
}

function onFilterChange() { renderComparePage(); }

// ── PAGE 3: ตารางรวม ──
function buildPage3() {
  if (!allItems) return '';
  const rows = allItems.map(it => {
    const rowCls = it.type2==='ขายอยู่' ? 'row-old' : 'row-new';
    const tagCls = it.type2==='ขายอยู่' ? 'old' : 'new';
    return `<tr class="${rowCls}">
      <td class="txt sticky-col">${it.type1}</td>
      <td><span class="tag-pill ${tagCls}">${it.type2}</span></td>
      <td class="txt">${it.brand}</td>
      <td class="txt">${it.code||'–'}</td>
      <td class="txt" style="min-width:200px">${it.desc}</td>
      <td>${fmt(it.qty2568,0)}</td>
      <td>${fmt(it.qty2569,0)}</td>
      <td>${fmtMoney(it.cost)}</td>
      <td>${fmtMoney(it.purchasePrice)}</td>
      <td>${fmtPct(it.purchaseProfitPct)}</td>
      <td>${fmtMoney(it.purchaseProfitPerUnit)}</td>
      <td>${fmtMoney(it.purchaseCompetitorPrice)}</td>
      <td>${fmtPct(it.purchaseDiff)}</td>
      <td>${summaryTag(it.purchaseSummary)}</td>
      <td>${fmtMoney(it.ivSellPrice)}</td>
      <td>${fmtPct(it.ivProfitPct)}</td>
      <td>${fmtMoney(it.ivProfitPerUnit)}</td>
      <td>${fmtMoney(it.ivCompetitorPrice)}</td>
      <td>${fmtPct(it.ivDiff)}</td>
      <td>${summaryTag(it.ivSummary)}</td>
      <td>${fmtMoney(it.ikSellPrice)}</td>
      <td>${fmtPct(it.ikProfitPct)}</td>
      <td>${fmtMoney(it.ikProfitPerUnit)}</td>
      <td>${fmtMoney(it.ikCompetitorPrice)}</td>
      <td>${fmtPct(it.ikDiff)}</td>
      <td>${summaryTag(it.ikSummary)}</td>
      <td class="txt">${it.website||'–'}</td>
    </tr>`;
  }).join('');

  return `
  <div class="page-title">ตารางข้อมูลทั้งหมด</div>
  <div class="page-sub">ทุกคอลัมน์ ทุกรายการ — เลื่อนแนวนอนเพื่อดูข้อมูลทั้งหมด</div>
  <div class="tbl-wrap"><table>
    <thead><tr>
      <th class="sticky-col">ประเภท1</th><th>ประเภท2</th><th>ยี่ห้อ</th><th>รหัสสินค้า</th><th>รายละเอียด</th>
      <th>จำนวนขาย 2568</th><th>จำนวนขาย 2569</th><th>ต้นทุน</th>
      <th>ราคาจัดซื้อ</th><th>%กำไรจัดซื้อ</th><th>กำไร/ชิ้น</th><th>ราคาคู่แข่ง</th><th>ส่วนต่าง</th><th>สรุป</th>
      <th>ขาย IV</th><th>%กำไร IV</th><th>กำไร/ชิ้น</th><th>ราคาคู่แข่ง</th><th>ส่วนต่าง</th><th>สรุป</th>
      <th>ขาย IK-IV</th><th>%กำไร IK</th><th>กำไร/ชิ้น</th><th>ราคาคู่แข่ง</th><th>ส่วนต่าง</th><th>สรุป</th>
      <th>เว็บไซต์</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>
  `;
}

// ── ROUTER ──
const pages = [
  { id:'pg0', label:'ภาพรวม', build: buildPage1, after: null },
  { id:'pg1', label:'เทียบรายละเอียด', build: buildPage2, after: renderComparePage },
  { id:'pg2', label:'ตารางทั้งหมด', build: buildPage3, after: null },
];

const navTabs = document.getElementById('navTabs');
const mainContent = document.getElementById('mainContent');
let rendered = {};

pages.forEach((pg,i) => {
  const btn = document.createElement('button');
  btn.className = 'tab-btn'+(i===0?' active':'');
  btn.textContent = pg.label;
  btn.onclick = () => showPage(i);
  navTabs.appendChild(btn);
  const div = document.createElement('div');
  div.className = 'page'+(i===0?' active':'');
  div.id = pg.id;
  mainContent.appendChild(div);
});

function showPage(idx) {
  navTabs.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  mainContent.querySelectorAll('.page').forEach((d,i)=>d.classList.toggle('active',i===idx));
  renderPage(idx);
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderPage(idx) {
  const div = mainContent.querySelectorAll('.page')[idx];
  div.innerHTML = pages[idx].build();
  if (pages[idx].after) pages[idx].after();
  rendered[idx] = true;
}

function renderAll() {
  rendered = {};
  pages.forEach((pg,i) => {
    const div = mainContent.querySelectorAll('.page')[i];
    if (div.classList.contains('active') || i===0) {
      renderPage(i);
    }
  });
}

load();
</script>
</body>
</html>
